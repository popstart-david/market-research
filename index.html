<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popstart — Market Research Primer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Newsreader:ital@0;1&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root{
    --navy:#1f3a5f; --navy-soft:#2e4f7a;
    --teal:#2e7d6b; --teal-bg:#e4f0ec;
    --amber:#b26b00; --amber-bg:#fbefd9;
    --red:#b23b3b; --red-bg:#fbecec;
    --ink:#23272e; --gray:#5a626e; --faint:#8b929c;
    --rule:#d9dfe6; --paper:#ffffff; --shell:#eceef1;
    --bot-bg:#f5f6f8;
    --display:'Fraunces',Georgia,serif;
    --serif:'Newsreader',Georgia,serif;
    --sans:'IBM Plex Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--shell);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}

  /* ============ profile header bar ============ */
  .topbar{
    background:var(--paper);border-bottom:1px solid var(--rule);
    padding:11px 22px;display:flex;align-items:center;gap:26px;flex-shrink:0;
    flex-wrap:wrap;
  }
  .topbar .logo{font-weight:600;letter-spacing:.13em;font-size:14px;color:var(--navy);}
  .topbar .agent-name{font-size:12px;color:var(--faint);border-left:1px solid var(--rule);
    padding-left:26px;}
  .topbar .profile-fields{margin-left:auto;display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
  @media(max-width:820px){
    .topbar{padding:10px 14px;gap:12px;}
    .topbar .agent-name{border-left:none;padding-left:0;flex-basis:100%;font-size:11px;margin-top:-4px;}
    .topbar .profile-fields{margin-left:0;width:100%;gap:10px;}
    .pf select{font-size:13px;padding:6px 8px;}
  }
  .pf{display:flex;flex-direction:column;gap:2px;}
  .pf label{font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;}
  .pf select{font-family:var(--sans);font-size:12px;color:var(--ink);padding:4px 7px;
    border:1px solid var(--rule);border-radius:6px;background:#fcfcfd;cursor:pointer;}
  .pf .derived{font-size:12px;color:var(--gray);padding:4px 7px;font-weight:500;}
  .scope-warn{font-size:11px;color:var(--amber);background:var(--amber-bg);
    padding:4px 9px;border-radius:6px;display:none;}

  /* ============ main split ============ */
  .stage{display:grid;grid-template-columns:minmax(380px,1fr) minmax(440px,1.25fr);
    gap:0;flex:1;min-height:0;}
  @media(max-width:900px){.stage{grid-template-columns:1fr;grid-template-rows:1fr 1fr;}}

  /* ============ chat pane ============ */
  .chat-pane{display:flex;flex-direction:column;min-height:0;background:var(--paper);
    border-right:1px solid var(--rule);}
  .chat-head{padding:12px 20px;border-bottom:1px solid var(--rule);flex-shrink:0;
    display:flex;align-items:center;gap:9px;}
  .chat-head .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);}
  .chat-head .t{font-size:12.5px;font-weight:600;color:var(--navy);}
  .chat-head .mode-tag{margin-left:auto;font-size:10.5px;color:var(--faint);
    background:var(--shell);padding:3px 9px;border-radius:999px;}
  .chat-scroll{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}

  .msg{display:flex;gap:9px;max-width:92%;}
  .msg.bot{align-self:flex-start;}
  .msg.user{align-self:flex-end;flex-direction:row-reverse;}
  .av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;
    align-items:center;justify-content:center;font-size:11px;font-weight:600;}
  .msg.bot .av{background:var(--teal);color:#fff;font-family:var(--display);}
  .msg.user .av{background:var(--teal-bg);color:var(--teal);}
  .bubble{padding:11px 14px;border-radius:13px;font-size:13.5px;line-height:1.55;}
  .msg.bot .bubble{background:var(--bot-bg);color:var(--ink);border-bottom-left-radius:4px;}
  .msg.user .bubble{background:var(--navy);color:#fff;border-bottom-right-radius:4px;}
  .bubble .hint{display:block;margin-top:7px;font-size:11.5px;color:var(--gray);
    font-style:italic;border-top:1px dashed var(--rule);padding-top:7px;}
  .bubble b{font-weight:600;}
  .bubble.coach{background:#fff;border:1px solid var(--amber);border-left:3px solid var(--amber);}
  .bubble.coach .ctag{display:block;font-size:10px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;color:var(--amber);margin-bottom:4px;}
  .authored-tag{display:inline-block;font-size:9.5px;font-weight:600;letter-spacing:.06em;
    text-transform:uppercase;color:var(--faint);border:1px solid var(--rule);background:#fff;
    padding:1px 6px;border-radius:4px;margin-left:6px;vertical-align:1px;cursor:help;}

  /* interactive controls inside chat */
  .controls{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;align-self:flex-start;
    max-width:92%;padding-left:35px;}
  .btn{font-family:var(--sans);font-size:12.5px;padding:7px 13px;border-radius:9px;cursor:pointer;
    border:1px solid var(--rule);background:#fff;color:var(--navy);transition:all .13s ease;}
  .btn:hover{border-color:var(--teal);background:var(--teal-bg);}
  .btn.on{background:var(--navy);border-color:var(--navy);color:#fff;}
  .btn.primary{background:var(--teal);border-color:var(--teal);color:#fff;}
  .btn.primary:hover{background:#256356;}
  .btn.ghost{font-size:11.5px;padding:5px 10px;color:var(--gray);}
  .btn.ex{font-size:11.5px;padding:5px 10px;border-style:dashed;color:var(--gray);}

  .textfield{display:flex;flex-direction:column;gap:7px;margin-top:4px;padding-left:35px;max-width:92%;}
  .textfield textarea{font-family:var(--sans);font-size:13px;padding:10px 12px;
    border:1px solid var(--rule);border-radius:9px;background:#fff;color:var(--ink);
    resize:vertical;min-height:64px;line-height:1.5;}
  .textfield textarea:focus{outline:none;border-color:var(--teal);}
  .textfield .charcount{font-size:10.5px;color:var(--faint);text-align:right;margin-top:-3px;}
  .textfield-row{display:flex;gap:7px;align-items:center;}
  .textfield-row .btn{margin-left:auto;}

  /* Dynamic List input (P3) */
  .dyn{padding-left:35px;max-width:92%;display:flex;flex-direction:column;gap:7px;margin-top:4px;}
  .dyn-row{display:flex;gap:6px;align-items:center;}
  .dyn-row .num{font-family:var(--display);font-weight:600;font-size:13px;color:var(--teal);
    width:18px;text-align:center;}
  .dyn-row input{flex:1;font-family:var(--sans);font-size:13px;padding:8px 11px;
    border:1px solid var(--rule);border-radius:9px;background:#fff;}
  .dyn-row input:focus{outline:none;border-color:var(--teal);}
  .dyn-row .rm{background:none;border:none;color:var(--faint);cursor:pointer;
    padding:4px 7px;font-size:14px;line-height:1;}
  .dyn-row .rm:hover{color:var(--red);}
  .dyn-controls{display:flex;gap:7px;align-items:center;margin-top:2px;}
  .dyn-controls .add{font-size:11.5px;padding:5px 10px;border-style:dashed;color:var(--gray);
    background:#fff;border:1px dashed var(--rule);border-radius:9px;cursor:pointer;}
  .dyn-controls .add:hover{color:var(--teal);border-color:var(--teal);}
  .dyn-controls .add[disabled]{opacity:.4;cursor:not-allowed;}
  .dyn-controls .counter{font-size:10.5px;color:var(--faint);margin-left:auto;}
  .dyn-controls .submit{font-size:12.5px;padding:7px 13px;}

  .typing{display:flex;gap:4px;padding:4px 0;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--faint);
    animation:bounce 1.4s infinite ease-in-out both;}
  .typing span:nth-child(1){animation-delay:-.32s;}
  .typing span:nth-child(2){animation-delay:-.16s;}
  @keyframes bounce{0%,80%,100%{transform:scale(0);opacity:.4;}40%{transform:scale(1);opacity:1;}}

  /* coach mode controls */
  .coach-suggested{padding-left:35px;max-width:92%;display:flex;flex-direction:column;gap:5px;margin-top:8px;}
  .coach-suggested .label{font-size:10px;font-weight:600;letter-spacing:.1em;
    text-transform:uppercase;color:var(--faint);margin-bottom:3px;}
  .coach-suggested .sbtn{font-family:var(--sans);font-size:12.5px;padding:8px 12px;
    border-radius:9px;border:1px solid var(--rule);background:#fff;color:var(--navy);
    text-align:left;cursor:pointer;transition:all .12s ease;}
  .coach-suggested .sbtn:hover{border-color:var(--teal);background:var(--teal-bg);}
  .coach-input{padding-left:35px;max-width:92%;display:flex;gap:6px;margin-top:7px;}
  .coach-input input{flex:1;font-family:var(--sans);font-size:13px;padding:8px 11px;
    border:1px solid var(--rule);border-radius:9px;background:#fff;}
  .coach-input input:focus{outline:none;border-color:var(--teal);}
  .coach-input button{font-family:var(--sans);font-size:12.5px;padding:8px 14px;
    border-radius:9px;border:1px solid var(--teal);background:var(--teal);color:#fff;cursor:pointer;}

  /* ============ canvas pane (tabs) ============ */
  .canvas-pane{display:flex;flex-direction:column;min-height:0;background:var(--shell);}
  .tabs{display:flex;background:var(--paper);border-bottom:1px solid var(--rule);flex-shrink:0;}
  .tab{font-family:var(--sans);font-size:12.5px;padding:12px 18px;background:none;border:none;
    border-bottom:2px solid transparent;cursor:pointer;color:var(--gray);font-weight:500;
    display:flex;align-items:center;gap:7px;}
  .tab:hover{color:var(--navy);}
  .tab.active{color:var(--navy);border-bottom-color:var(--teal);font-weight:600;}
  .badge-n{font-size:10px;background:var(--shell);color:var(--gray);padding:2px 7px;
    border-radius:999px;font-weight:500;}
  .tab.active .badge-n{background:var(--teal-bg);color:var(--teal);}
  .tabview{flex:1;overflow-y:auto;padding:0;display:none;}
  .tabview.active{display:block;}

  /* Input Variables tab */
  .iv-intro{padding:20px 22px 12px;font-size:12px;color:var(--gray);}
  .iv-list{padding:0 22px 22px;display:flex;flex-direction:column;gap:11px;}
  .iv-row{background:var(--paper);border:1px solid var(--rule);border-radius:8px;padding:13px 15px;}
  .iv-row .key{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;}
  .iv-row .key .qlabel{font-family:var(--display);font-weight:600;font-size:13px;color:var(--teal);}
  .iv-row .key .question{font-size:11.5px;color:var(--gray);flex:1;margin-left:8px;}
  .iv-row .source{font-size:9.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    padding:2px 7px;border-radius:4px;}
  .src-user{background:var(--teal-bg);color:var(--teal);}
  .src-default{background:var(--amber-bg);color:var(--amber);}
  .src-pending{background:#eceef0;color:var(--gray);}
  .iv-row .value{font-size:13.5px;line-height:1.5;}
  .iv-row .value.empty{color:var(--faint);font-style:italic;}
  .iv-row .edit-row{margin-top:8px;display:flex;gap:6px;align-items:flex-start;}
  .iv-row .edit-row textarea, .iv-row .edit-row input{flex:1;font-family:var(--sans);font-size:13px;
    padding:7px 10px;border:1px solid var(--rule);border-radius:7px;}
  .iv-row .edit-row textarea{min-height:48px;resize:vertical;}
  .iv-row .edit-row .btn{padding:5px 10px;font-size:11.5px;}
  .iv-row .edit-row select{font-family:var(--sans);font-size:13px;padding:7px 10px;
    border:1px solid var(--rule);border-radius:7px;}

  /* Cards tab */
  .cards-intro{padding:20px 22px 12px;font-size:12px;color:var(--gray);}
  .card{background:var(--paper);border:1px solid var(--rule);border-radius:8px;
    margin:0 22px 11px;padding:14px 16px;transition:opacity .3s ease;}
  .card.empty{opacity:.55;}
  .card .ctitle{font-family:var(--display);font-weight:600;font-size:14px;color:var(--navy);margin-bottom:8px;}
  .card .cbody{font-size:13px;line-height:1.5;color:var(--ink);}
  .placeholder-bar{height:8px;background:var(--shell);border-radius:4px;margin-bottom:6px;}
  .placeholder-bar.short{width:55%;}

  /* Deliverable tab */
  .deliv-empty{padding:60px 30px;text-align:center;}
  .deliv-empty .di{font-family:var(--display);font-size:17px;color:var(--navy);margin-bottom:8px;font-weight:500;}
  .deliv-empty .ds{font-size:12.5px;color:var(--gray);line-height:1.5;max-width:340px;margin:0 auto;}
  .deliv-actions{background:var(--paper);border-bottom:1px solid var(--rule);padding:9px 22px;
    display:flex;gap:14px;justify-content:flex-end;font-size:12px;}
  .deliv-actions a{display:flex;align-items:center;gap:5px;color:var(--gray);text-decoration:none;cursor:pointer;}
  .deliv-actions a:hover{color:var(--navy);}
  .deliv-actions svg{width:13px;height:13px;}

  .zone{background:var(--paper);border:1px solid var(--rule);border-radius:8px;
    padding:18px 22px;margin-bottom:18px;}
  .zlabel{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--faint);
    text-transform:uppercase;margin-bottom:5px;}
  .ztitle{font-family:var(--display);font-weight:600;font-size:19px;color:var(--navy);
    margin-bottom:14px;line-height:1.25;}
  .ztitle.with-logo{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;}
  .ztitle .znum{display:inline-block;background:var(--navy);color:#fff;font-family:var(--display);
    font-size:12px;width:21px;height:21px;border-radius:50%;text-align:center;line-height:21px;
    margin-right:9px;vertical-align:2px;font-weight:500;}
  .logo-slot{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
  .logo-slot img{width:42px;height:42px;border-radius:50%;}
  .logo-cap{font-size:8.5px;color:var(--faint);letter-spacing:.04em;}

  .snapshot{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);
    border:1px solid var(--rule);border-radius:8px;overflow:hidden;}
  @media(max-width:520px){.snapshot{grid-template-columns:repeat(2,1fr);}}
  .snap-cell{background:#fafbfc;padding:11px 12px;}
  .snap-cell .k{font-size:9.5px;font-weight:600;letter-spacing:.08em;color:var(--faint);
    text-transform:uppercase;margin-bottom:3px;}
  .snap-cell .v{font-size:13px;font-weight:500;color:var(--navy);line-height:1.35;}

  /* Zone 2 — narrative primer */
  .primer-lede{background:var(--teal-bg);border-left:3px solid var(--teal);
    padding:13px 16px;border-radius:0 8px 8px 0;margin-bottom:18px;}
  .primer-lede .l{font-family:var(--serif);font-style:italic;font-size:15px;line-height:1.55;color:var(--navy);}
  .primer-section{margin-bottom:16px;}
  .primer-section:last-child{margin-bottom:0;}
  .primer-section h4{font-family:var(--display);font-weight:600;font-size:13.5px;color:var(--navy);
    margin-bottom:6px;}
  .primer-section p{font-family:var(--serif);font-size:14.5px;line-height:1.55;color:var(--ink);
    margin-bottom:8px;}
  .primer-section p:last-child{margin-bottom:0;}
  .comp-list{display:flex;flex-direction:column;gap:11px;}
  .comp{padding-left:0;}
  .comp .n{font-family:var(--display);font-weight:600;font-size:13.5px;color:var(--navy);
    display:inline;margin-right:6px;}
  .comp .d{font-family:var(--serif);font-size:14.5px;line-height:1.5;color:var(--ink);display:inline;}

  /* Strategic Trade-Off two-col */
  .tradeoff{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--rule);
    border:1px solid var(--rule);border-radius:8px;overflow:hidden;margin:14px 0;}
  @media(max-width:520px){.tradeoff{grid-template-columns:1fr;}}
  .tradeoff .col{background:#fafbfc;padding:14px 16px;}
  .tradeoff .col h5{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
    color:var(--teal);margin-bottom:9px;}
  .tradeoff .col.not h5{color:var(--gray);}
  .tradeoff ul{list-style:none;}
  .tradeoff li{font-size:13px;line-height:1.5;padding-left:14px;position:relative;margin-bottom:5px;color:var(--ink);}
  .tradeoff li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;
    border-radius:50%;background:var(--teal);}
  .tradeoff .col.not li::before{background:var(--gray);}

  /* Zone 3 — tier label, NO percentage */
  .validation{display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
  .vtier{flex-shrink:0;padding:18px 22px;background:var(--shell);border-radius:10px;
    display:flex;flex-direction:column;align-items:center;min-width:144px;}
  .vtier .lbl{font-size:9.5px;font-weight:600;letter-spacing:.1em;color:var(--faint);
    text-transform:uppercase;margin-bottom:4px;}
  .vtier .tier{font-family:var(--display);font-weight:600;font-size:22px;line-height:1.15;}
  .vtier .conf{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    margin-top:5px;padding:2px 8px;border-radius:4px;}
  .vtier.validated{background:var(--teal-bg);}
  .vtier.validated .tier{color:var(--teal);}
  .vtier.validated .conf{background:var(--teal);color:#fff;}
  .vtier.progress{background:var(--amber-bg);}
  .vtier.progress .tier{color:var(--amber);}
  .vtier.progress .conf{background:var(--amber);color:#fff;}
  .vtier.hypothesis{background:#eceef0;}
  .vtier.hypothesis .tier{color:var(--gray);}
  .vtier.hypothesis .conf{background:var(--gray);color:#fff;}
  .vnote{flex:1;min-width:240px;}
  .vnote .pre{font-family:var(--sans);font-size:10.5px;font-weight:600;letter-spacing:.05em;
    text-transform:uppercase;color:var(--faint);margin-bottom:6px;}
  .vnote .note{font-family:var(--serif);font-size:14.5px;line-height:1.55;color:var(--ink);}

  /* Coach moment */
  .coach-block{border-left:3px solid var(--navy-soft);background:#f7f8fa;padding:13px 16px;
    border-radius:0 8px 8px 0;margin-bottom:11px;}
  .coach-block:last-child{margin-bottom:0;}
  .coach-block .q{font-family:var(--serif);font-style:italic;font-size:14.5px;line-height:1.5;}
  .coach-block .src{font-size:10.5px;color:var(--faint);margin-top:6px;}

  /* What's Next */
  .next-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--rule);
    border:1px solid var(--rule);border-radius:8px;overflow:hidden;margin-bottom:18px;}
  @media(max-width:520px){.next-grid{grid-template-columns:1fr;}}
  .next-col{background:#fafbfc;padding:14px 15px;}
  .next-col h4{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--faint);
    text-transform:uppercase;margin-bottom:9px;}
  .next-col ul{list-style:none;}
  .next-col li{font-size:12.5px;line-height:1.5;padding-left:14px;position:relative;margin-bottom:8px;}
  .next-col li:last-child{margin-bottom:0;}
  .next-col li::before{content:"";position:absolute;left:0;top:7px;width:5px;height:5px;
    border-radius:50%;background:var(--teal);}
  .terms-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px 22px;}
  @media(max-width:520px){.terms-grid{grid-template-columns:1fr;}}
  .term{font-size:11.5px;color:var(--gray);line-height:1.5;}
  .term b{color:var(--navy);font-weight:600;}

  /* Boundaries block */
  .bound-block{background:#fafbfc;border-left:3px solid var(--amber);padding:13px 16px;
    border-radius:0 8px 8px 0;margin-bottom:18px;}
  .bound-block p{font-size:11.5px;line-height:1.55;color:var(--gray);margin-bottom:7px;}
  .bound-block p:last-child{margin-bottom:0;}

  @keyframes flash{0%{background:rgba(46,125,107,.14);}100%{background:transparent;}}
  .flash{animation:flash .7s ease;}
  @keyframes slidein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .msg,.controls,.textfield,.dyn{animation:slidein .25s ease;}
</style>
</head>
<body>

<!-- ============ PROFILE HEADER ============ -->
<div class="topbar">
  <span class="logo">POPSTART</span>
  <span class="agent-name">Market Research Primer &middot; Module 1, Section 5</span>
  <div class="profile-fields">
    <span class="scope-warn" id="scope-warn">Module 1 applies broadly &mdash; some examples assume a product-or-service business.</span>
    <div class="pf">
      <label for="pf-stage">Business stage</label>
      <select id="pf-stage">
        <option>Just Exploring</option>
        <option selected>Pre-Launch</option>
        <option>Already in Business</option>
      </select>
    </div>
    <div class="pf">
      <label for="pf-industry">Industry</label>
      <select id="pf-industry">
        <option selected>Home &amp; Living</option>
        <option>Consumer Tech</option>
        <option>Food &amp; Beverage</option>
        <option>Apparel</option>
        <option>Beauty &amp; Wellness</option>
        <option>Toys &amp; Kids</option>

</div>

    <div class="chat-head">
      <span class="dot" aria-hidden="true"></span>

</div>

<script>
/* ====================================================================
   PROMPT DEFINITIONS — six prompts per ADD §3.2
   ==================================================================== */
const PROMPTS = {
  P1: { key:"P1", q:"Tell me about your target customer.",
    hint:"Describe your ideal customer in one or two sentences. Be specific. The more specific this is, the more useful your primer will be.",
    example:"Busy professionals aged 30 to 50 who are frustrated with unreliable home service contractors and willing to pay more for consistency.",
    type:"text",
    placeholder:"Who is this for? Age, situation, frustration\u2026" },

  P2: { key:"P2", q:"What problem are you solving for them?",
    hint:"What is your customer trying to solve \u2014 and why does it frustrate them?",
    example:"They can never find a contractor who shows up on time, does quality work, and communicates clearly. They've been burned enough times that they've given up trying.",
    type:"text",
    placeholder:"What's the gap they're stuck in today?" },

  P3: { key:"P3", q:"Who are your top three competitors?",
    hint:"These can be direct competitors, indirect alternatives, or even the DIY option. Pick up to three.",
    example:"Row 1: Local cleaning companies with good reviews. Row 2: TaskRabbit. Row 3: Customers doing it themselves or hiring informally.",
    type:"dynlist", cap:3, min:1,
    placeholder:"Competitor or alternative" },

  P4: { key:"P4", q:"What do your customers prioritize most when choosing?",
    hint:"Not what you think they should value \u2014 what actually drives their decision.",
    example:"Reliability and consistency. They will pay more for someone who shows up on time, does quality work, and communicates clearly every time.",
    type:"text",
    placeholder:"Price? Speed? Trust? Quality? Something else?" },

  P5: { key:"P5", q:"How are you different from your competitors?",
    hint:"Not just better \u2014 different. In a way that matters to your specific customer.",
    example:"While competitors compete on price or speed, we compete on consistency and trust. Same team every visit, detailed communication, quality guarantee. More expensive but more reliable.",
    type:"text",
    placeholder:"What trade-off are you making that they aren't?" },

  P6: { key:"P6", q:"Where are you with research validation?",
    hint:"Be honest. Knowing the difference between what you've validated and what you're assuming is what makes this primer useful.",
    example:null,
    type:"select",
    options:[
      "Talked to customers and validated this",
      "Talked to some customers but still have gaps",
      "Based on observation and assumption",
      "Not Sure"
    ] }
};

/* ====================================================================
   STATE
   ==================================================================== */
const S = {
  stage:"Pre-Launch", industry:"Home & Living", btype:"Product",
  mode:"standard",
  answers:{ P1:null,P2:null,P3:null,P4:null,P5:null,P6:null },
  sources:{ P1:null,P2:null,P3:null,P4:null,P5:null,P6:null },
  step:0,
  plan:["P1","P2","P3","P4","P5","P6"],
  generated:false,
};

/* ====================================================================
   DOM HELPERS
   ==================================================================== */
const chat = document.getElementById('chat');
function scrollDown(){ chat.scrollTop = chat.scrollHeight; }

function botMsg(html, cls){
  const m = document.createElement('div');
  m.className = 'msg bot';
  m.innerHTML = `<div class="av">P</div><div class="bubble ${cls||''}">${html}</div>`;
  chat.appendChild(m); scrollDown(); return m;
}
function userMsg(text){
  const m = document.createElement('div');
  m.className = 'msg user';
  m.innerHTML = `<div class="av">You</div><div class="bubble">${escapeHTML(text)}</div>`;
  chat.appendChild(m); scrollDown();
}
function typing(){
  const m = document.createElement('div');
  m.className = 'msg bot';
  m.innerHTML = `<div class="av">P</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(m); scrollDown(); return m;
}
function botSay(html, cls, delay){
  return new Promise(res=>{
    const tp = typing();
    setTimeout(()=>{ tp.remove(); botMsg(html,cls); res(); }, delay||650);
  });
}
function clearControls(){
  document.querySelectorAll('.controls,.textfield,.dyn,.coach-suggested,.coach-input').forEach(e=>e.remove());
}
function escapeHTML(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ====================================================================
   CHAT FLOW
   ==================================================================== */
async function start(){
  renderIV(); renderCards(); renderDeliv();
  const openings = {
    "Just Exploring":"You're in the best possible position \u2014 you haven't spent anything yet. These six questions will help you figure out if there's a real market for your idea before you commit. Answer based on what you know now, and flag anything that's still a guess. That's not failure. That's information.",
    "Pre-Launch":"You're close to launch, which means this research has real stakes. Let's make sure your positioning is grounded in what your customers actually need \u2014 not just what makes sense on paper. Be honest about what you've validated and what's still an assumption.",
    "Already in Business":"You're already selling, which means you have real data to work with. Let's use these six questions to sharpen your positioning and identify any gaps between what you assumed about your market and what you're actually seeing."
  };
  await botSay("Let's build your Market Research Primer. I'll ask you six questions about your customer, your competitors, and how you're different. Be as honest as you can \u2014 especially about what you've actually tested versus what you're still assuming. That honesty is what makes the output useful.", null, 400);
  await botSay(openings[S.stage], null, 750);
  // Depth-mode selection disabled per ADD §1.3 / Engine default \u2014 all sessions Standard
  S.mode = "standard";
  S.plan = ["P1","P2","P3","P4","P5","P6"];
  S.step = 0;
  document.getElementById('mode-tag').textContent = "Standard mode";
  setTimeout(()=> askNext(), 350);
}

function askNext(){
  if(S.step >= S.plan.length){ finishCollection(); return; }
  const p = PROMPTS[S.plan[S.step]];
  renderPrompt(p);
}

function advance(){
  S.step++;
  setTimeout(()=> askNext(), 280);
}

function renderPrompt(p){
  clearControls();
  const bubble = `${p.q}<span class="hint">${p.hint}</span>`;
  botMsg(bubble);

  if(p.example){
    const exRow = document.createElement('div');
    exRow.className = 'controls';
    const exBtn = document.createElement('button');
    exBtn.className = 'btn ex';
    exBtn.textContent = '\uD83D\uDCA1 See an example';
    exBtn.onclick = ()=>{
      exBtn.remove();
      botMsg(`<b>Example \u2014</b> ${escapeHTML(p.example)}`);
      scrollDown();
    };
    exRow.appendChild(exBtn);
    chat.appendChild(exRow);
  }

  if(p.type==='text')    renderTextControl(p);
  else if(p.type==='select')  renderSelectControl(p);
  else if(p.type==='dynlist') renderDynListControl(p);
  scrollDown();
}

/* ---- TEXT input (P1, P2, P4, P5) ---- */
function renderTextControl(p){
  const tf = document.createElement('div');
  tf.className = 'textfield';
  const ta = document.createElement('textarea');
  ta.placeholder = p.placeholder || '';
  ta.maxLength = 1000;
  const counter = document.createElement('div');
  counter.className = 'charcount';
  counter.textContent = '0 / 1000';
  ta.addEventListener('input', ()=>{
    counter.textContent = ta.value.length + ' / 1000';
    send.disabled = ta.value.trim().length === 0;
    send.style.opacity = ta.value.trim().length === 0 ? .5 : 1;
  });
  ta.addEventListener('keydown', e=>{
    if(e.key==='Enter' && (e.ctrlKey||e.metaKey)){ e.preventDefault(); if(ta.value.trim()) submit(); }
  });
  const row = document.createElement('div');
  row.className = 'textfield-row';
  const send = document.createElement('button');
  send.className = 'btn primary';
  send.textContent = 'Send';
  send.disabled = true; send.style.opacity = .5;
  const submit = ()=> handleTextAnswer(p, ta.value.trim());
  send.onclick = submit;
  row.appendChild(counter); row.appendChild(send);
  tf.appendChild(ta); tf.appendChild(row);
  chat.appendChild(tf); ta.focus();
}

async function handleTextAnswer(p, val){
  clearControls();
  userMsg(val);
  S.answers[p.key] = val;
  S.sources[p.key] = 'user';
  renderIV();
  await maybeProbe(p);
  advance();
}

/* ---- SELECT input (P6) ---- */
function renderSelectControl(p){
  const row = document.createElement('div');
  row.className = 'controls';
  p.options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = opt;
    btn.onclick = ()=> handleSelectAnswer(p, opt);
    row.appendChild(btn);
  });
  chat.appendChild(row);
}

async function handleSelectAnswer(p, opt){
  clearControls();
  userMsg(opt);
  if(p.key==='P6' && opt==='Not Sure'){
    S.answers.P6 = 'Not Sure';
    S.sources.P6 = 'default';
    renderIV();
    await botSay("No problem. Think about it this way: have you had a real conversation with someone who fits your target customer profile \u2014 where they told you about their frustration in their own words? If not, that's totally fine. I'll treat your primer as a starting hypothesis \u2014 something you're going to test, not something you've proven. You can update this anytime in <b>Your Answers</b>.", null, 850);
    advance(); return;
  }
  S.answers[p.key] = opt;
  S.sources[p.key] = 'user';
  renderIV();
  await maybeProbe(p);
  advance();
}

/* ---- DYNAMIC LIST input (P3 only, cap 3, min 1) ---- */
function renderDynListControl(p){
  const wrap = document.createElement('div');
  wrap.className = 'dyn';
  const rows = document.createElement('div');
  rows.className = 'dyn-rows';
  wrap.appendChild(rows);

  const controlsRow = document.createElement('div');
  controlsRow.className = 'dyn-controls';
  const addBtn = document.createElement('button');
  addBtn.className = 'add';
  addBtn.textContent = '+ Add another';
  const counter = document.createElement('span');
  counter.className = 'counter';
  const submit = document.createElement('button');
  submit.className = 'btn primary submit';
  submit.textContent = 'Confirm';
  submit.disabled = true; submit.style.opacity = .5;
  controlsRow.appendChild(addBtn); controlsRow.appendChild(counter); controlsRow.appendChild(submit);
  wrap.appendChild(controlsRow);

  function recount(){
    const inputs = rows.querySelectorAll('input');
    const nonEmpty = Array.from(inputs).filter(i=>i.value.trim().length>0).length;
    counter.textContent = `${inputs.length}/${p.cap} rows \u00B7 ${nonEmpty} filled`;
    addBtn.disabled = inputs.length >= p.cap;
    submit.disabled = nonEmpty < p.min;
    submit.style.opacity = nonEmpty < p.min ? .5 : 1;
  }
  function addRow(initial){
    const r = document.createElement('div');
    r.className = 'dyn-row';
    const num = document.createElement('span');
    num.className = 'num';
    const inp = document.createElement('input');
    inp.placeholder = p.placeholder || '';
    inp.value = initial || '';
    inp.addEventListener('input', recount);
    inp.addEventListener('keydown', e=>{
      if(e.key==='Enter'){ e.preventDefault();
        if(!submit.disabled) doSubmit();
        else if(rows.querySelectorAll('.dyn-row').length < p.cap){ addRow(''); }
      }
    });
    const rm = document.createElement('button');
    rm.className = 'rm'; rm.innerHTML = '&times;'; rm.title = 'Remove';
    rm.onclick = ()=>{
      if(rows.querySelectorAll('.dyn-row').length <= 1) return; // keep at least one
      r.remove(); renumber(); recount();
    };
    r.appendChild(num); r.appendChild(inp); r.appendChild(rm);
    rows.appendChild(r);
    renumber(); recount();
    inp.focus();
  }
  function renumber(){
    Array.from(rows.querySelectorAll('.dyn-row')).forEach((r,i)=>{
      r.querySelector('.num').textContent = (i+1)+'.';
    });
  }
  async function doSubmit(){
    const vals = Array.from(rows.querySelectorAll('input')).map(i=>i.value.trim()).filter(v=>v.length>0);
    clearControls();
    userMsg(vals.join(' \u00B7 '));
    S.answers.P3 = vals;
    S.sources.P3 = 'user';
    renderIV();
    // P3 single-row follow-up (ADD §3.2 follow-up logic)
    if(vals.length === 1){
      await botSay(`Got it. <b>One more thing</b> \u2014 is there a second option your customer might choose, even if it's not a direct competitor? Doing it themselves, going without, sticking with what they've got? You can add one and I'll fold it in, or we can keep moving with what you have.`, null, 700);
      // offer add-another or proceed
      const followRow = document.createElement('div');
      followRow.className = 'controls';
      const addOne = document.createElement('button');
      addOne.className = 'btn';
      addOne.textContent = 'Add one more';
      const keep = document.createElement('button');
      keep.className = 'btn ghost';
      keep.textContent = 'Keep what I have';
      addOne.onclick = ()=>{
        clearControls();
        // re-render the dynlist with the existing entry preserved + an empty second row
        renderPrompt(p);
        // after rerender, populate row 1 with the prior value and add a second
        setTimeout(()=>{
          const dyn = document.querySelector('.dyn');
          if(!dyn) return;
          const inputs = dyn.querySelectorAll('input');
          if(inputs.length){ inputs[0].value = vals[0]; inputs[0].dispatchEvent(new Event('input')); }
          // simulate add row
          const addBtn2 = dyn.querySelector('.add');
          if(addBtn2 && !addBtn2.disabled) addBtn2.click();
        }, 50);
      };
      keep.onclick = async ()=>{
        clearControls();
        await maybeProbe(p);
        advance();
      };
      followRow.appendChild(addOne); followRow.appendChild(keep);
      chat.appendChild(followRow); scrollDown();
      return;
    }
    await maybeProbe(p);
    advance();
  }
  submit.onclick = doSubmit;
  addBtn.onclick = ()=>{ if(rows.querySelectorAll('.dyn-row').length < p.cap) addRow(''); };

  chat.appendChild(wrap);
  addRow('');
}

/* ====================================================================
   GAP PROBES & ENGAGEMENT (ADD §2.4, §12)
   ==================================================================== */
async function maybeProbe(p){
  // G1: P1 too vague (<8 words, market not person, etc.)
  if(p.key==='P1'){
    const v = (S.answers.P1||'').trim();
    const wordCount = v.split(/\s+/).filter(Boolean).length;
    const looksLikeMarket = /^(small businesses|consumers|millennials|gen[ -]?z|moms|founders|enterprises|people|users|customers)$/i.test(v);
    if(wordCount < 8 || looksLikeMarket){
      await botSay(`<span class="ctag">Coach moment</span>Let's tighten that up \u2014 who specifically is this for? Picture one real person you've actually met who has this problem. What do you know about them? You can edit your answer anytime, or keep moving and we'll come back to it.`, 'coach', 750);
    }
  }
  // G2: P2 sounds like product features
  if(p.key==='P2'){
    const v = (S.answers.P2||'').toLowerCase();
    if(/\b(our (product|platform|app|service)|we offer|we provide|we have)\b/.test(v) && !/\b(frustrat|struggl|burn|stuck|tired)/.test(v)){
      await botSay(`<span class="ctag">Coach moment</span>Step back from your solution for a second \u2014 what was your customer doing yesterday that frustrated them? Describe their day, not your fix. We'll keep going, but it's worth a second pass later.`, 'coach', 750);
    }
  }
  // G3: P3 contains generic categories (no proper nouns)
  if(p.key==='P3'){
    const vals = S.answers.P3 || [];
    const genericPatterns = /^(local |various |different |the |a )?(cleaners|cleaning compan|contractors|companies|services|providers|brands|options|alternatives)\.?\s*$/i;
    const generic = vals.some(v=> genericPatterns.test(v.trim()) || v.trim().split(/\s+/).length <= 2);
    if(generic){
      await botSay(`<span class="ctag">Coach moment</span>Quick prompt \u2014 can you name one <em>specific</em> company your customer has actually used or mentioned? Categories like "local cleaners" tell us less than "Maria's Cleaning Service." Not a blocker, just worth tightening when you have a real name to drop in.`, 'coach', 800);
    }
  }
  // P5 engagement: comparative-better without trade-off (G5)
  if(p.key==='P5'){
    const v = (S.answers.P5||'').toLowerCase();
    if(/\b(better|more|faster|cheaper|easier)\b/.test(v) && !/\b(instead of|rather than|at the cost of|trade[- ]?off|sacrifice|giving up)\b/.test(v)){
      await botSay(`<span class="ctag">Coach moment</span>Positioning is what you're giving up to be different \u2014 not what you're better at. What is your competitor doing that you're choosing <em>not</em> to do? You can refine your answer in <b>Your Answers</b> later if something clicks.`, 'coach', 800);
    }
  }
  // P6 engagement: acknowledge honesty (ADD §2.4 "Acknowledging an honesty signal in P6")
  if(p.key==='P6'){
    const v = S.answers.P6;
    if(v === 'Based on observation and assumption' || v === 'Not Sure'){
      await botSay(`That's the right place to start this from \u2014 it means the primer will tell you what to go find out, not what to defend.`, null, 600);
    } else if(v === 'Talked to customers and validated this'){
      // G6 check: hedging language in P1/P2 with validated P6
      const p1p2 = ((S.answers.P1||'')+' '+(S.answers.P2||'')).toLowerCase();
      if(/\b(i think|probably|i imagine|i guess|maybe|might be|i suppose)\b/.test(p1p2)){
        await botSay(`<span class="ctag">Coach moment</span>One thing worth pausing on \u2014 you marked your research as validated, but you described your customer with some hedging language ("I think," "probably," etc.). One of those is the real signal. You can refine the primer either way \u2014 just worth a second look before you commit to anything based on it.`, 'coach', 900);
      }
    } else if(v === 'Based on observation and assumption'){
      // G7 check: feeling-language in P2 with unvalidated P6
      const p2 = (S.answers.P2||'').toLowerCase();
      if(/\b(burned|stuck|tired|frustrated|fed up|given up|exhausted)\b/.test(p2)){
        await botSay(`<span class="ctag">Coach moment</span>Side note \u2014 the way you described the frustration ("burned," "given up") sounds like words that came from real people. Have you actually had this conversation, even informally? If yes, your validation might be closer to "Talked to some customers" than you marked.`, 'coach', 900);
      }
    }
  }
}

/* ====================================================================
   FINISH COLLECTION \u2192 GENERATE
   ==================================================================== */
async function finishCollection(){
  clearControls();
  await botSay("Got everything I need. Based on your customer, your competitors, and where your research stands right now, here is your Market Research Primer.", null, 700);
  await new Promise(r=>setTimeout(r,250));
  S.generated = true;
  // switch to Cards tab
  document.querySelector('.tab[data-tab="cards"]').click();
  await populateCardsSequentially();
  renderDeliv();
  await new Promise(r=>setTimeout(r,400));
  // CTA to view deliverable
  const ctaRow = document.createElement('div');
  ctaRow.className = 'controls';
  const v = document.createElement('button');
  v.className = 'btn primary';
  v.textContent = 'View full primer \u2192';
  v.onclick = ()=> document.querySelector('.tab[data-tab="deliv"]').click();
  ctaRow.appendChild(v);
  chat.appendChild(ctaRow); scrollDown();

  setTimeout(()=> enterCoachMode(), 1100);
}

/* ====================================================================
   COACH MODE \u2014 5 topics per ADD §2.5
   ==================================================================== */
const COACH_TOPICS = [
  { label:"How do I find people to talk to?",
    keywords:["find people","recruit","interview subjects","who to ask","find customers","find interviewees","talk to who"],
    answer:"Start with the smallest possible step: name three people who you think fit your target customer profile, who you already have a way to reach. A friend, a former colleague, a neighbor, someone you saw post about the problem online. Reach out one-by-one with a specific ask \u2014 <em>\u201CI'm building something for [people like you] and I'd value 20 minutes of your time to hear how you handle [the problem]. Not pitching anything, just listening.\u201D</em> That language matters. People will say yes to listening; they say no to pitches. Five conversations from three warm intros and two cold ones is enough to start." },
  { label:"What questions should I ask in a customer interview?",
    keywords:["interview questions","what to ask","customer interview","conversation guide","what do i say"],
    answer:"The best customer interviews are about their past behavior, not their future intentions. Don't ask <em>\u201Cwould you buy this?\u201D</em> \u2014 people are bad at predicting that. Ask <em>\u201Cwhen was the last time you ran into [the problem]? What did you do? What did it cost you?\u201D</em> Three questions you can run through in 20 minutes: (1) Tell me about the last time you dealt with [the problem]. (2) What did you try? Why did you choose that? (3) If you could wave a wand, what would the ideal solution look like? Listen for the words they use. Use them later." },
  { label:"My competitors all look the same \u2014 how do I find a real differentiator?",
    keywords:["differentiator","differentiation","competitors look","all alike","hard to differentiate","find difference"],
    answer:"If your competitors look the same on the surface, you're usually comparing the wrong layer. Go deeper: what does each one <em>optimize for</em> and what does each one <em>give up</em>? A competitor that's cheap is giving up something \u2014 quality, speed, support, customization. A competitor that's fast is giving up something \u2014 depth, accuracy, personalization. Map those trade-offs on a 2\u00D72 of \u201Cwhat they emphasize\u201D vs \u201Cwhat they sacrifice.\u201D Your real differentiator is usually in a quadrant nobody is occupying \u2014 because every competitor has already made the comfortable trade-off, and the uncomfortable one is open. That's where your positioning lives." },
  { label:"My customers all said different things \u2014 how do I find the pattern?",
    keywords:["different things","contradicted","mixed signals","different answers","conflicting feedback","can't find pattern"],
    answer:"Different answers don't always mean different customers \u2014 sometimes they mean you talked to people from different <em>segments</em> and you haven't separated them yet. Sort your conversations by what each person was <em>optimizing for</em> (cost, speed, reliability, status, simplicity). You'll usually find clusters: three people who all wanted reliability, two who wanted price, one who wanted speed. That's not contradiction \u2014 that's segmentation. The cluster that's the largest, most underserved, and best-matched to what you can deliver is your primary target. The others go in a \u201Cfuture markets\u201D file. Don't try to serve all of them at launch." },
  { label:"How do I know when I've done enough research to move forward?",
    keywords:["enough research","when to stop","ready to launch","research done","how much is enough","when do i stop"],
    answer:"You've done enough when you can finish these three sentences without hedging: <em>\u201CMy customer is [specific person], and they're frustrated because [specific gap], so they currently [specific workaround that's failing them]. I solve it by [specific approach competitors don't take]. They'll pay [specific price range] because [specific value].\u201D</em> If any of those still feel like guesses, you have a research gap there. As a directional benchmark: 5\u201310 conversations if you're just exploring, 10\u201320 if you're pre-launching, and an ongoing 5+ per quarter if you're already in business. <em>(Industry estimates \u2014 verify with a qualified market research professional before treating as a finish line.)</em>" }
];

function enterCoachMode(){
  document.getElementById('mode-tag').textContent = "Coach mode";
  // pick transition line per P6 (ADD §1.5 token table)
  const gapTokens = {
    "Talked to customers and validated this":"pressure-testing what you've heard \u2014 the assumptions that survived your conversations are the most dangerous ones",
    "Talked to some customers but still have gaps":"the gaps you already know about \u2014 those are the conversations you need next",
    "Based on observation and assumption":"your first five customer conversations \u2014 that's where this primer either holds up or doesn't",
    "Not Sure":"your first five customer conversations \u2014 that's where this primer either holds up or doesn't"
  };
  const tok = gapTokens[S.answers.P6] || gapTokens["Based on observation and assumption"];
  botSay(`Your Market Research Primer is ready. The most important thing you can do now is get it in front of real people \u2014 starting with <b>${tok}</b>. Want to talk through how to approach those conversations?`, null, 750)
    .then(()=> renderCoachControls());
}

function renderCoachControls(){
  clearControls();
  const suggested = document.createElement('div');
  suggested.className = 'coach-suggested';
  suggested.innerHTML = `<div class="label">Suggested questions</div>`;
  COACH_TOPICS.forEach(topic=>{
    const btn = document.createElement('button');
    btn.className = 'sbtn'; btn.textContent = topic.label;
    btn.onclick = ()=> handleCoachTopic(topic);
    suggested.appendChild(btn);
  });
  chat.appendChild(suggested);

  const inp = document.createElement('div');
  inp.className = 'coach-input';
  const txt = document.createElement('input');
  txt.placeholder = "Or type your own question\u2026";
  const send = document.createElement('button'); send.textContent = "Send";
  const submit = ()=>{
    const q = txt.value.trim();
    if(!q) return;
    userMsg(q); txt.value = '';
    suggested.remove(); inp.remove();
    handleCoachFreeText(q);
  };
  send.onclick = submit;
  txt.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
  inp.appendChild(txt); inp.appendChild(send);
  chat.appendChild(inp);
  scrollDown(); txt.focus();
}

async function handleCoachTopic(topic){
  document.querySelectorAll('.coach-suggested,.coach-input').forEach(e=>e.remove());
  userMsg(topic.label);
  await botSay(topic.answer + ' <span class="authored-tag" title="Prototype: this answer is authored, not generated live. Production agent will use the same boundaries but respond dynamically.">authored answer</span>', null, 900);
  renderCoachControls();
}

async function handleCoachFreeText(q){
  const lc = q.toLowerCase();
  // out-of-scope detection
  const outOfScope = /\b(market siz|tam|total addressable|pricing|how much should i charge|revenue projection|financial projection|legal|trademark|patent|ip protection)\b/.test(lc);
  if(outOfScope){
    await botSay(`That's outside this agent's scope \u2014 market sizing, pricing strategy, financial projections, and legal questions are decisions I can't help you with directly. For market sizing or quantitative segment data, published industry reports or a qualified market research professional are the right next step. For the others, talk to the relevant professional. Anything else about your primer I can help you think through?`, null, 900);
    renderCoachControls();
    return;
  }
  // keyword-best-match
  let best = null, bestScore = 0;
  for(const topic of COACH_TOPICS){
    const score = (topic.keywords||[]).reduce((n,kw)=> n + (lc.includes(kw)?1:0), 0);
    if(score > bestScore){ best = topic; bestScore = score; }
  }
  if(best){
    await botSay(best.answer + ' <span class="authored-tag" title="Prototype: this answer is authored, not generated live.">authored answer</span>', null, 900);
  } else {
    await botSay(`That's a good question. The honest answer: I can help you think it through at a high level, but the specific call is one to make after you've talked to a few more customers. What I can tell you is that for your situation \u2014 <b>${S.stage}</b>, targeting <b>${shortCustomer()}</b>, with validation status <b>${S.answers.P6||'\u2014'}</b> \u2014 the suggested questions above are where I can go deepest. Anything in there worth pulling on?`, null, 1000);
  }
  renderCoachControls();
}

function shortCustomer(){
  const v = S.answers.P1 || '';
  if(!v) return '\u2014';
  const firstSent = v.split(/[.!?]/)[0].trim();
  const words = firstSent.split(/\s+/);
  if(words.length <= 8) return firstSent;
  return words.slice(0,8).join(' ') + '\u2026';
}
function shortProblem(){
  const v = S.answers.P2 || '';
  if(!v) return '\u2014';
  const m = v.match(/\b(unreliable|inconsistent|broken|missing|poor|bad|lack of|no clear|hard to find|can't find|frustrat\w*)\s+[\w\s]{1,30}/i);
  if(m) return m[0].replace(/\s+/g,' ').replace(/^./, c=>c.toUpperCase()).slice(0,32);
  const words = v.split(/\s+/);
  return words.slice(0,5).join(' ') + (words.length>5?'\u2026':'');
}
function shortCompetitor(){
  const list = S.answers.P3 || [];
  if(!list.length) return '\u2014';
  // pick brand-like (starts with capital, single word or two)
  const brand = list.find(v => /^[A-Z][a-zA-Z]+(?:\s[A-Z][a-zA-Z]+)?$/.test(v.trim()));
  return (brand || list[0]).trim();
}
function shortPriority(){
  const v = S.answers.P4 || '';
  if(!v) return '\u2014';
  const m = v.match(/\b([\w]+(?:\s(?:and|over|vs\.?|or)\s\w+)?)/i);
  if(m) return m[0].replace(/^./, c=>c.toUpperCase()).slice(0,28);
  return v.split(/\s+/).slice(0,4).join(' ');
}
function validationLabel(){
  const v = S.answers.P6;

}

/* Strategic Trade-off columns per ADD §6 sub-section 2.4 */
function tradeoffColumns(){
  const p4 = (S.answers.P4||'').toLowerCase();
  const p5 = (S.answers.P5||'').toLowerCase();
  let opt = [], notOpt = [];
  if(/(reliab|consist|trust|quality)/.test(p4)){
    opt = ["Consistent, reliable delivery","Quality that doesn't need follow-up","Trust built through repetition","Premium pricing"];
    notOpt = ["Lowest cost option","Price-sensitive customers","Maximum market size","Flexibility in quality or timing"];
  } else if(/(speed|fast|quick|on time)/.test(p4)){
    opt = ["Speed of delivery","Quick turnaround","Responsive communication","Premium for urgency"];
    notOpt = ["Lowest cost option","Deep customization","Maximum market size","Long-form engagements"];
  } else if(/(price|cheap|afford|low cost|cost)/.test(p4)){
    opt = ["Lowest accessible price","Scale through volume","Simple, repeatable offer","Wide market reach"];
    notOpt = ["Premium feature depth","High-touch service","Customization","Niche specialization"];
  } else {
    // generic fallback: pull verbs/keywords from P5
    const tokens = p5.split(/[,.]/).map(t=>t.trim()).filter(Boolean).slice(0,4);
    opt = tokens.length ? tokens.map(t=> t.replace(/^./, c=>c.toUpperCase())) : ["Your stated differentiators (refine in Your Answers)"];
    notOpt = ["What your competitors emphasize that you're choosing to forgo (refine in Your Answers)"];
  }
  return {opt, notOpt};
}

/* Zone 2 generated prose per ADD §6 */
function primerProse(){
  const cust = S.answers.P1 || '';
  const prob = S.answers.P2 || '';
  const comps = S.answers.P3 || [];
  const prio = S.answers.P4 || '';
  const pos  = S.answers.P5 || '';

  const cust1 = cust.split(/(?<=[.!?])\s+/)[0] || cust;
  const probShort = prob.split(/(?<=[.!?])\s+/)[0] || prob;
  const lede = `You serve ${cust1.toLowerCase().replace(/\.$/,'')}. While competitors compete on ${competitorAxis()}, you compete on ${differentiatorAxis(prio,pos)}.`;

  // First sentence of P4, lower-cased and trimmed of trailing period \u2014 used inline
  const prioFirst = (prio.split(/(?<=[.!?])\s+/)[0] || prio).replace(/\.$/,'').toLowerCase();
  const customer = `${cust}${prio && !prob.toLowerCase().includes((prio.toLowerCase().split(/\s+/)[0])||'_____') ? ` Their decisions are driven by ${prioFirst}.` : ''}`.trim();

  const doingInstead = comps.length
    ? `Today, they ${comps.length>1 ? 'are choosing between ' : 'mostly rely on '}${comps.map(c=>`<b>${escapeHTML(c)}</b>`).join(', ')}, or doing the work themselves. None of these fully solve the problem \u2014 each one trades off something your target customer cares about.`
    : `Today, they're working around the problem with whatever they can find. None of the available options fully solve it.`;

  const competitorBlocks = comps.length ? comps.map((c, i)=>{
    const characterizations = [
      `Familiar option but limited in fit \u2014 strong on convenience, less so on ${differentiatorAxis(prio,pos).split(/\s/).slice(0,2).join(' ')}.`,
      `Broad reach but inconsistent on ${differentiatorAxis(prio,pos).split(/\s/).slice(0,2).join(' ')}. Customers find what they need eventually but the experience is uneven.`,
      `The default when nothing else works. These customers are already in your market \u2014 they just haven't found you yet.`
    ];
    return `<div class="comp"><span class="n">${escapeHTML(c)} \u2014</span><span class="d">${characterizations[i] || characterizations[2]}</span></div>`;
  }).join('') : `<div class="comp"><span class="d">No specific competitors named yet \u2014 refine this in Your Answers when you can.</span></div>`;

  const advantage = `${prio ? `Customers want ${prioFirst}.` : ''} Competitors offer the comfortable trade-off; you offer the uncomfortable one \u2014 and your target customer has already decided that's worth choosing.`;

  return {
    lede,
    customer,
    doingInstead,
    competitorBlocks,
    advantage,
    tradeoff: tradeoffColumns()
  };
}
function competitorAxis(){
  const p3 = (S.answers.P3||[]).join(' ').toLowerCase();
  if(/(taskrabbit|uber|fiverr|amazon|marketplace)/.test(p3)) return 'volume and convenience';
  if(/(diy|themselves|nothing)/.test(p3)) return 'doing nothing or doing it themselves';
  return 'price or speed';
}
function differentiatorAxis(prio, pos){
  if(!prio && !pos) return 'a different trade-off';
  const t = (prio + ' ' + pos).toLowerCase();
  if(/(reliab|consist|trust|quality)/.test(t)) return 'consistency and trust';
  if(/(speed|fast|on time)/.test(t)) return 'speed and responsiveness';
  if(/(simple|easy|clear)/.test(t)) return 'simplicity and clarity';
  if(/(custom|personal|bespoke|tailored)/.test(t)) return 'customization and depth';
  return prio ? prio.split(/\s+/).slice(0,2).join(' ').toLowerCase() : 'a different kind of value';
}

/* Edit a single prompt's answer post-generation \u2014 triggers cascade */
function openEdit(k){
  const p = PROMPTS[k];
  const row = document.getElementById('iv-'+k);
  if(!row) return;
  const curr = S.answers[k];
  let editor;
  if(p.type === 'text'){
    editor = `<div class="edit-row">
      <textarea id="ed-${k}">${escapeHTML(curr||'')}</textarea>
      <button class="btn primary" onclick="saveEdit('${k}')">Save</button>
      <button class="btn ghost" onclick="renderIV()">Cancel</button>
    </div>`;
  } else if(p.type === 'select'){
    const opts = p.options.map(o=>`<option ${o===curr?'selected':''}>${o}</option>`).join('');
    editor = `<div class="edit-row">
      <select id="ed-${k}">${opts}</select>
      <button class="btn primary" onclick="saveEdit('${k}')">Save</button>
      <button class="btn ghost" onclick="renderIV()">Cancel</button>
    </div>`;
  } else if(p.type === 'dynlist'){
    const arr = Array.isArray(curr) ? curr : [];
    const items = arr.concat(['','','']).slice(0,p.cap).map((v,i)=>
      `<input id="ed-${k}-${i}" placeholder="${escapeHTML(p.placeholder||'')}" value="${escapeHTML(v)}"/>`
    ).join('');
    editor = `<div class="edit-row" style="flex-direction:column;align-items:stretch;">
      ${items}
      <div style="display:flex;gap:6px;margin-top:6px;">
        <button class="btn primary" onclick="saveEdit('${k}')">Save</button>
        <button class="btn ghost" onclick="renderIV()">Cancel</button>
      </div>
    </div>`;
  }
  // replace the edit button row
  const editRow = row.querySelector('.edit-row');
  if(editRow) editRow.outerHTML = editor;
}
function saveEdit(k){
  const p = PROMPTS[k];
  let v;
  if(p.type === 'text') v = document.getElementById('ed-'+k).value.trim();
  else if(p.type === 'select') v = document.getElementById('ed-'+k).value;
  else if(p.type === 'dynlist'){
    v = [];
    for(let i=0;i<p.cap;i++){
      const el = document.getElementById('ed-'+k+'-'+i);
      if(el && el.value.trim()) v.push(el.value.trim());
    }
    if(v.length < p.min){ alert('Please provide at least '+p.min+' row.'); return; }
  }
  S.answers[k] = v;
  S.sources[k] = 'user';
  renderIV();
  populateCards();
  renderDeliv();
  // brief cascade flash on the deliverable tab indicator
  const tv = document.getElementById('tv-deliv');
  tv.classList.add('flash');
  setTimeout(()=> tv.classList.remove('flash'), 700);
}

    const p = PROMPTS[k]; const a = S.answers[k];
    const qLabel = "Q" + k.slice(1);
    let val;
    if(a==null) val='<span style="color:var(--faint);font-style:italic;">\u2014</span>';
    else if(Array.isArray(a)) val = a.length ? a.map(escapeHTML).join(', ') : 'None';
    else val = escapeHTML(a);
    return `<div style="display:grid;grid-template-columns:30px 1fr;gap:8px;margin-bottom:7px;">
      <span style="font-family:var(--display);font-weight:600;color:var(--teal);font-size:13px;">${qLabel}</span>
      <span><span style="color:var(--gray);font-size:11.5px;">${escapeHTML(p.q)}</span><br>
      <b style="font-size:12.5px;">${val}</b></span></div>`;
  }).join('');
  return {
    "1": `${synthesis}
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--rule);">
        <div style="font-family:var(--display);font-weight:500;font-size:15px;color:var(--navy);margin-bottom:10px;">Your answers</div>
        ${answerRows}
      </div>`,
    "2": `<em>${prose.lede}</em>`,
    "3": prose.customer,
    "4": prose.competitorBlocks,
    "5": `${prose.tradeoff.opt.length} optimizations chosen \u00B7 ${prose.tradeoff.notOpt.length} trade-offs declined. <em>Optimizing for ${prose.tradeoff.opt.slice(0,2).join(', ').toLowerCase()}\u2026</em>`,
    "6": prose.advantage,
    "7": `<b>${validationLabel()} \u2014 ${confidenceLabel()}</b>. ${confidenceNote()}`,
    "8": cm.map(c=>`<em>"${c.q.slice(0,80)}\u2026"</em>`).join('<br><br>'),
    "9": `<b>This week:</b> ${actions[0]}<br><b>Next on the platform:</b> Section 6 \u2014 Naming Your Business.`,
    "10":relevantTerms().map(t=>`<b>${t.n}</b>`).join(' \u00B7 ')
  };
}
function populateCards(){
  if(!S.generated) return;
  const content = cardContent();
  CARD_DEFS.forEach(c=>{
    const el = document.getElementById('card-'+c.n);
    if(!el) return;
    el.classList.remove('empty');
    el.querySelector('.cbody').innerHTML = content[c.n];
  });
  document.getElementById('cards-count').textContent = '10/10';
}
async function populateCardsSequentially(){
  const content = cardContent();
  for(let i=0;i<CARD_DEFS.length;i++){
    await new Promise(res=>setTimeout(res, 220));
    const c = CARD_DEFS[i];
    const el = document.getElementById('card-'+c.n);
    if(!el) continue;
    el.classList.remove('empty');
    el.querySelector('.cbody').innerHTML = content[c.n];
    el.classList.add('flash');
    document.getElementById('cards-count').textContent = `${i+1}/${CARD_DEFS.length}`;
  }
}

document.querySelectorAll('.tab').forEach(t=>{

    document.querySelectorAll('.tab').forEach(x=>{ x.classList.remove('active'); x.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.tabview').forEach(x=> x.classList.remove('active'));
    t.classList.add('active'); t.setAttribute('aria-selected','true');
    document.getElementById('tv-'+t.dataset.tab).classList.add('active');
  };
});

/* ====================================================================
   PROFILE HEADER \u2014 stage / industry / type wiring
   ==================================================================== */
const INDUSTRY_TYPE = {
  "Home & Living":"Product",
  "Consumer Tech":"Product",
  "Food & Beverage":"Product",
  "Apparel":"Product",
  "Beauty & Wellness":"Product",
  "Toys & Kids":"Product",
  "Consulting / Services":"Service"
};
document.getElementById('pf-stage').addEventListener('change', e=>{
  S.stage = e.target.value;
  if(S.generated){ populateCards(); renderDeliv(); }
});
document.getElementById('pf-industry').addEventListener('change', e=>{
  S.industry = e.target.value;
  const t = INDUSTRY_TYPE[S.industry] || 'Product';
  S.btype = t;
  document.getElementById('pf-type').textContent = t;
  // module-scope warning if Service (Module 1 is broadly applicable but the agent has product-leaning defaults)
  const w = document.getElementById('scope-warn');
  if(t === 'Service'){
    w.style.display = 'inline-block';
    w.textContent = 'Module 1 applies broadly \u2014 some product-leaning examples may not apply to a Service business.';
  } else { w.style.display = 'none'; }
  if(S.generated){ populateCards(); renderDeliv(); }
});

/* ====================================================================
   BOOT
   ==================================================================== */
window.addEventListener('DOMContentLoaded', ()=>{
  S.stage = document.getElementById('pf-stage').value;
  S.industry = document.getElementById('pf-industry').value;
  S.btype = INDUSTRY_TYPE[S.industry] || 'Product';
  document.getElementById('pf-type').textContent = S.btype;
  start();
});
